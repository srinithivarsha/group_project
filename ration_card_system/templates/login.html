<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-sign-in-alt me-2"></i>Ration Card Login
                    </h4>
                </div>

                <div class="card-body">
                    <form method="POST">

                        <!-- Ration Card -->
                        <div class="mb-3">
                            <label class="form-label">Ration Card Number</label>
                            <input type="text"
                                   class="form-control"
                                   name="card_number"
                                   value="RC2024001"
                                   required>
                        </div>

                        <!-- Email or Phone -->
                        <div class="mb-3">
                            <label class="form-label">Email / Phone</label>
                            <input type="text"
                                   class="form-control"
                                   name="contact"
                                   placeholder="email or 10-digit phone"
                                   required
                                   pattern="^\d{10}$|^[^@\s]+@[^@\s]+\.[^@\s]+$"
                                   title="Phone number must be exactly 10 digits OR email must contain @">
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   required>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg">
                                <i class="fas fa-lock me-2"></i>Secure Login
                            </button>
                        </div>
                    </form>

                    {% if error %}
                    <div class="alert alert-danger mt-3">
                        {{ error }}
                    </div>
                    {% endif %}

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
