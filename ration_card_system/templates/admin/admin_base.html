<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Ration Card System – Admin</span>
        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT SIDEBAR -->
        <div class="col-md-2 bg-light min-vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="{{ url_for('manage_stock') }}">Manage Stock</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="{{ url_for('view_reports') }}">Reports</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="{{ url_for('handle_complaints') }}">Complaints</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link" href="{{ url_for('add_user') }}">Add User</a>
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

</body>
</html>
